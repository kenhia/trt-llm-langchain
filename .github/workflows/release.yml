name: Release

# Publishes to PyPI on a version tag (e.g. v0.1.0) via Trusted Publishing (OIDC) —
# no stored token. Requires a PyPI "pending publisher" configured for this repo +
# workflow (release.yml). See docs/getting-started or the PyPI publishing settings.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write  # required for Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Lint + test (gate the release)
        run: |
          uv sync
          uv run ruff check src tests examples
          uv run pytest -q
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
