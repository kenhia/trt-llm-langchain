name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync (incl. dev group)
        run: uv sync
      - name: Lint
        run: uv run ruff check src tests examples
      - name: Test (offline; live suite excluded by default)
        run: uv run pytest -q
